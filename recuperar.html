<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Recuperar Contraseña - SportClub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <img src="logo.png" alt="SportClub Logo" style="height: 60px; margin-bottom: 20px;">
        <h2>Recuperar Contraseña</h2>
        <p style="font-size: 0.9em; margin-bottom: 20px;">Ingresa tu correo y te enviaremos un enlace para restablecerla.</p>
        <form action="login.html">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Enviar Enlace</button>
        </form>
        <div style="margin-top: 20px; font-size: 0.9em;">
            <a href="login.html" style="color: var(--primary);">Volver al Login</a>
        </div>
    </div>
</body>
</html>
