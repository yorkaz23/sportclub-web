<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SportClub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container">
        <img src="logo.png" alt="SportClub Logo" style="height: 60px; margin-bottom: 20px;">
        
        <h2>Iniciar Sesión</h2>
        
        <form action="dashboard-user.html" style="margin-top: 20px;">
            <div class="form-group">
                <label>Correo Electrónico</label>
                <input type="email" placeholder="usuario@correo.com" required>
            </div>
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" placeholder="********" required>
            </div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Ingresar</button>
        </form>
        
        <div style="margin-top: 20px; font-size: 0.9em;">
            <a href="recuperar.html" style="color: var(--primary);">¿Olvidaste tu contraseña?</a> | 
            <a href="registro.html" style="color: var(--primary);">Regístrate aquí</a>
        </div>
        
        <div style="margin-top: 30px; border-top: 1px solid #ccc; padding-top: 15px; font-size: 0.8em;">
            <p>Simular ingreso rápido como:</p>
            <a href="dashboard-user.html">Usuario</a> | 
            <a href="dashboard-coach.html">Coach</a> | 
            <a href="dashboard-admin.html">Admin</a>
        </div>
    </div>
</body>
</html>
