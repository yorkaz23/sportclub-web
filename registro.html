<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro - SportClub</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-container" style="margin-top: 40px;">
        <img src="logo.png" alt="SportClub Logo" style="height: 60px; margin-bottom: 20px;">
        <h2>Crear Cuenta</h2>
        <form action="login.html" style="margin-top: 20px;">
            <div class="form-group"><label>Nombre Completo</label><input type="text" required></div>
            <div class="form-group"><label>Correo Electrónico</label><input type="email" required></div>
            <div class="form-group"><label>Contraseña</label><input type="password" required></div>
            <button type="submit" class="btn" style="width: 100%; margin-top: 10px;">Registrarme</button>
        </form>
        <div style="margin-top: 20px; font-size: 0.9em;">
            <a href="login.html" style="color: var(--primary);">¿Ya tienes cuenta? Inicia sesión</a>
        </div>
    </div>
</body>
</html>
